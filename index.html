<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مشروع العباسيين | النظام المالي</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:#eef3fb;

overflow-x:hidden;

}

/* Sidebar */

.sidebar{

position:fixed;

right:0;

top:0;

width:270px;

height:100vh;

background:linear-gradient(180deg,#0d1b4c,#10255e,#18377b);

color:#fff;

padding-top:20px;

box-shadow:0 10px 30px rgba(0,0,0,.25);

z-index:999;

}

.logo{

text-align:center;

margin-bottom:30px;

}

.logo h2{

font-size:24px;

font-weight:800;

color:#fff;

}

.logo p{

font-size:13px;

color:#d7d7d7;

}

.sidebar ul{

list-style:none;

padding:0;

}

.sidebar ul li{

margin:7px 15px;

}

.sidebar ul li a{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

padding:14px;

border-radius:14px;

color:white;

transition:.3s;

font-size:15px;

}

.sidebar ul li a:hover{

background:rgba(255,255,255,.12);

transform:translateX(-4px);

}

.sidebar ul li a.active{

background:#ffffff;

color:#0d1b4c;

font-weight:bold;

}

.sidebar i{

width:25px;

text-align:center;

}

/* Main */

.main{

margin-right:270px;

padding:30px;

}

/* Top */

.topbar{

background:white;

border-radius:18px;

padding:18px 25px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 10px 30px rgba(0,0,0,.08);

margin-bottom:30px;

}

.search{

width:350px;

position:relative;

}

.search input{

width:100%;

padding:13px 45px 13px 15px;

border:none;

background:#eef3fb;

border-radius:12px;

outline:none;

}

.search i{

position:absolute;

right:15px;

top:15px;

color:#666;

}

.user{

display:flex;

align-items:center;

gap:15px;

}

.user img{

width:45px;

height:45px;

border-radius:50%;

}

.user h6{

margin:0;

font-weight:700;

}

.user span{

font-size:12px;

color:gray;

}

/* Cards */

.card-box{

background:rgba(255,255,255,.65);

backdrop-filter:blur(14px);

border-radius:20px;

padding:25px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

height:100%;

}

.card-box:hover{

transform:translateY(-5px);

}

.card-icon{

width:60px;

height:60px;

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:26px;

color:white;

margin-bottom:20px;

}

.blue{

background:#2563eb;

}

.green{

background:#10b981;

}

.orange{

background:#f59e0b;

}

.red{

background:#ef4444;

}

.card-box h3{

font-size:30px;

font-weight:800;

}

.card-box p{

margin:0;

color:gray;

}

.table-box{

background:white;

border-radius:20px;

padding:20px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

margin-top:30px;

}

.table thead{

background:#18377b;

color:white;

}

.chart-box{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

margin-top:30px;

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">

<h2>العباسيين</h2>

<p>النظام المالي</p>

</div>

<ul>

<li>
<a class="active" href="#">
<i class="fa-solid fa-chart-line"></i>
لوحة التحكم
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-file-invoice-dollar"></i>
الفواتير
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-building"></i>
الموردون
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-money-bill-transfer"></i>
الدفعات
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-clock"></i>
المستحقات
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-chart-column"></i>
التقارير
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-users"></i>
المستخدمون
</a>
</li>

<li>
<a href="#">
<i class="fa-solid fa-right-from-bracket"></i>
تسجيل الخروج
</a>
</li>

</ul>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<div class="search">

<i class="fa fa-search"></i>

<input
type="text"
placeholder="ابحث عن مورد أو فاتورة أو سنة..."
>

</div>

<div class="user">

<div>

<h6>مدير النظام</h6>

<span>مشروع العباسيين</span>

</div>

<img src="https://i.pravatar.cc/100">

</div>

</div>
