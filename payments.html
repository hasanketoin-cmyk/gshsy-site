<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= Sidebar ================= -->

<div class="sidebar">

<div class="logo">

<h2>K GROUP</h2>

<p>ERP Financial System</p>

</div>

<ul>

<li>
<a href="dashboard.html">
<i class="fa-solid fa-chart-line"></i>
لوحة التحكم
</a>
</li>

<li>
<a href="invoices.html">
<i class="fa-solid fa-file-invoice-dollar"></i>
الفواتير
</a>
</li>

<li>
<a href="suppliers.html">
<i class="fa-solid fa-building"></i>
الموردون
</a>
</li>

<li>
<a class="active" href="payments.html">
<i class="fa-solid fa-money-bill-transfer"></i>
الدفعات
</a>
</li>

<li>
<a href="dues.html">
<i class="fa-solid fa-clock"></i>
المستحقات
</a>
</li>

<li>
<a href="reports.html">
<i class="fa-solid fa-chart-column"></i>
التقارير

</li>

<li>
<a href="users.html">
<i class="fa-solid fa-users"></i>
المستخدمون
</a>
</li>

</ul>

</div>

<!-- ================= Main ================= -->

<div class="main">

<div class="topbar">

<h3>إدارة الدفعات</h3>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#paymentModal">

<i class="fa-solid fa-plus"></i>

تسجيل دفعة

</button>

</div>

<div class="table-card mt-4">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>رقم الفاتورة</th>
<th>المورد</th>
<th>المدفوع</th>
<th>إجمالي الفاتورة</th>
<th>التاريخ</th>
<th>الحالة</th>
<th>الإجراءات</th>

</tr>

</thead>

<tbody id="paymentsTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- ================= Payment Modal ================= -->

<div class="modal fade" id="paymentModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

تسجيل دفعة

</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>رقم الفاتورة</label>

<select id="invoiceSelect" class="form-select">

<option value="">اختر الفاتورة</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>المورد</label>

<input
id="paymentSupplier"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>إجمالي الفاتورة</label>

<input
id="invoiceAmount"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>المدفوع سابقاً</label>

<input
id="paidAmount"
class="form-control"
readonly
value="0">

</div>

<div class="col-md-6 mb-3">

<label>المتبقي</label>

<input
id="remainingAmount"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>مبلغ الدفعة</label>

<input
type="number"
id="paymentAmount"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>طريقة الدفع</label>

<select
id="paymentMethod"
class="form-select">

<option value="نقداً">نقداً</option>

<option value="تحويل">تحويل</option>

<option value="شيك">شيك</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>تاريخ الدفع</label>

<input
type="date"
id="paymentDate"
class="form-control">

</div>

<div class="col-md-12">

<label>ملاحظات</label>

<textarea
id="paymentNotes"
rows="3"
class="form-control"></textarea>

</div>

</div>

</div>

<div class="modal-footer">

<button
id="savePayment"
class="btn btn-success">

حفظ الدفعة

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="js/payments.js"></script>

<script type="module" src="js/guard.js"></script>
</body>

</html>
