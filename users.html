<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K GROUP ERP | المستخدمون</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<h2>K GROUP</h2>

<p>ERP Financial System</p>

</div>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> لوحة التحكم</a></li>

<li><a href="invoices.html"><i class="fa-solid fa-file-invoice-dollar"></i> الفواتير</a></li>

<li><a href="suppliers.html"><i class="fa-solid fa-building"></i> الموردون</a></li>

<li><a href="payments.html"><i class="fa-solid fa-money-bill-transfer"></i> الدفعات</a></li>

<li><a href="dues.html"><i class="fa-solid fa-clock"></i> المستحقات</a></li>

<li><a href="reports.html"><i class="fa-solid fa-chart-column"></i> التقارير</a></li>

<li><a class="active" href="users.html"><i class="fa-solid fa-users"></i> المستخدمون</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h3>إدارة المستخدمين</h3>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#userModal">

<i class="fa-solid fa-user-plus"></i>

إضافة مستخدم

</button>

</div>

<div class="row mt-4">

<div class="col-md-3">

<div class="card p-3 text-center">

<h6>إجمالي المستخدمين</h6>

<h3 id="usersCount">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h6>المدراء</h6>

<h3 id="adminsCount">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h6>المحاسبون</h6>

<h3 id="accountantsCount">0</h3>

</div>

</div>

<div class="col-md-3">

<div class="card p-3 text-center">

<h6>المستخدمون النشطون</h6>

<h3 id="activeUsers">0</h3>

</div>

</div>

</div>

<div class="table-card mt-4">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>الاسم</th>

<th>البريد الإلكتروني</th>

<th>الدور</th>

<th>الحالة</th>

<th>الإجراءات</th>

</tr>

</thead>

<tbody id="usersTable">
</tbody>

</table>

</div>

</div>

</div>

<!-- ===================== -->
<!-- User Modal -->
<!-- ===================== -->

<div class="modal fade" id="userModal" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

إضافة مستخدم

</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="mb-3">

<label class="form-label">

الاسم

</label>

<input
id="userName"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

البريد الإلكتروني

</label>

<input
type="email"
id="userEmail"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

كلمة المرور

</label>

<input
type="password"
id="userPassword"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

الدور

</label>

<select
id="userRole"
class="form-select">

<option value="admin">

مدير

</option>

<option value="accountant">

محاسب

</option>

<option value="viewer">

موظف

</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

الحالة

</label>

<select
id="userStatus"
class="form-select">

<option value="true">

نشط

</option>

<option value="false">

موقوف

</option>

</select>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
id="saveUser">

حفظ المستخدم

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script type="module" src="js/guard.js"></script>

<script type="module" src="js/users.js"></script>

</body>

</html>
