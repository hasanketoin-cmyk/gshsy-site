<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K GROUP ERP | تسجيل الدخول</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:linear-gradient(135deg,#0d47a1,#1565c0);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-card{

width:430px;

background:#fff;

padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

}

.logo{

text-align:center;

margin-bottom:35px;

}

.logo h1{

font-size:38px;

font-weight:800;

color:#0d47a1;

margin-bottom:5px;

}

.logo p{

color:#777;

font-size:15px;

}

.form-label{

font-weight:700;

}

.form-control{

height:55px;

border-radius:12px;

}

.btn-login{

height:55px;

font-size:18px;

font-weight:bold;

border-radius:12px;

}

#errorMessage{

display:none;

}

#loading{

display:none;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<h1>K GROUP</h1>

<p>ERP Financial System</p>

</div>

<div class="mb-3">

<label class="form-label">

البريد الإلكتروني

</label>

<input

type="email"

id="email"

class="form-control"

placeholder="example@email.com">

</div>

<div class="mb-3">

<label class="form-label">

كلمة المرور

</label>

<input

type="password"

id="password"

class="form-control"

placeholder="********">

</div>

<div

class="alert alert-danger"

id="errorMessage">

بيانات الدخول غير صحيحة

</div>

<div

class="text-center"

id="loading">

<div class="spinner-border text-primary"></div>

<p class="mt-2">

جاري تسجيل الدخول...

</p>

</div>

<button

class="btn btn-primary btn-login w-100"

id="loginBtn">

<i class="fa-solid fa-right-to-bracket"></i>

تسجيل الدخول

</button>
<div class="text-center mt-4">

<small class="text-muted">

© 2026 K GROUP ERP

</small>

</div>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/guard.js"></script>
</body>

</html>
