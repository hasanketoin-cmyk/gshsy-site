<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K GROUP ERP | الإعدادات</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<h2>K GROUP</h2>

<p>ERP Financial System</p>

</div>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> لوحة التحكم</a></li>

<li><a href="invoices.html"><i class="fa-solid fa-file-invoice-dollar"></i> الفواتير</a></li>

<li><a href="suppliers.html"><i class="fa-solid fa-building"></i> الموردون</a></li>

<li><a href="payments.html"><i class="fa-solid fa-money-bill-transfer"></i> الدفعات</a></li>

<li><a href="dues.html"><i class="fa-solid fa-clock"></i> المستحقات</a></li>

<li><a href="reports.html"><i class="fa-solid fa-chart-column"></i> التقارير</a></li>

<li><a href="users.html"><i class="fa-solid fa-users"></i> المستخدمون</a></li>

<li><a class="active" href="settings.html"><i class="fa-solid fa-gear"></i> الإعدادات</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h3>إعدادات النظام</h3>

</div>

<div class="table-card mt-4">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">اسم الشركة</label>

<input id="companyName" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">البريد الإلكتروني</label>

<input id="companyEmail" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">رقم الهاتف</label>

<input id="companyPhone" class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">العملة الافتراضية</label>

<select id="defaultCurrency" class="form-select">

<option>SYP</option>

<option>USD</option>

<option>EUR</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">العنوان</label>

<textarea id="companyAddress" class="form-control" rows="3"></textarea>

</div>
<div class="col-md-6 mb-3">

<label class="form-label">

اسم النظام

</label>

<input
id="systemName"
class="form-control"
value="K GROUP ERP">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

المنطقة الزمنية

</label>

<select
id="timeZone"
class="form-select">

<option value="Asia/Damascus">

Asia/Damascus

</option>

<option value="Europe/Berlin">

Europe/Berlin

</option>

<option value="UTC">

UTC

</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">

شعار الشركة (رابط الصورة)

</label>

<input
id="companyLogo"
class="form-control">

</div>

<div class="col-md-12 text-end">

<button
class="btn btn-success"
id="saveSettings">

<i class="fa-solid fa-floppy-disk"></i>

حفظ الإعدادات

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="js/settings.js"></script>

<script type="module" src="js/guard.js"></script>

</body>

</html>
