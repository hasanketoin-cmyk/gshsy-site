>

<div class="user-box">

<div>

<span>مشروع العباسيين</span>

</div>

<img src="https://i.pravatar.cc/100?img=12">

</div>

<!-- عنوان الصفحة -->

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2 class="fw-bold">

<i class="fa-solid fa-file-invoice-dollar text-primary"></i>

إدارة الفواتير

</h2>

إضافة وإدارة وتتبع جميع فواتير المشروع

</p>

<button class="btn btn-primary">

<i class="fa-solid fa-plus"></i>

فاتورة جديدة

</button>

<!-- بطاقة إضافة فاتورة -->

<div class="table-card">

<h4 class="mb-4">

بيانات الفاتورة

</h4>

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">رقم الفاتورة</label>

<input type="text" class="form-control" id="invoiceNumber">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">التاريخ</label>

<input type="date" class="form-control" id="invoiceDate">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">المورد</label>

<select class="form-select" id="supplier">

<option>اختر المورد</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">القسم</label>

<select class="form-select">

<option>الإنشاءات</option>

<option>الكهرباء</option>

<option>الميكانيك</option>

<option>التشطيبات</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">العملة</label>

<select class="form-select">

<option>USD</option>

<option>SYP</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">المبلغ</label>

<input type="number" class="form-control">

</div>
