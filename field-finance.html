<div class="table-card">

<div class="row">

<div class="col-md-3 mb-3">

<label class="form-label">التاريخ</label>

<input
type="date"
class="form-control"
id="incomeDate">

</div>

<div class="col-md-3 mb-3">

<label class="form-label">الملعب</label>

<select
class="form-select"
id="field">

<option value="ملعب 1">ملعب 1</option>

<option value="ملعب 2">ملعب 2</option>

</select>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">العملة</label>

<select
class="form-select"
id="currency">

<option value="SYP">SYP</option>

<option value="USD">USD</option>

</select>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">

إجمالي الإيراد

</label>

<input
type="number"
class="form-control"
id="grossIncome">
